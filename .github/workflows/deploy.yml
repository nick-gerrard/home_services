name: Deploy to Linode

on:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install deps
        working-directory: backend
        run: uv sync

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check .

  deploy:
    name: Deploy
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.LINODEDEPLOY }}
          script: |
            set -e
            cd /home/nickg/home_services
            git pull origin main
            cd backend
            $HOME/.local/bin/uv sync --no-dev
            sudo systemctl restart home-services
